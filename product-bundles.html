<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bundle Catalogue | Lumina</title>
  
  <link rel="icon" type="image/png" href="/Favicon.png?v=4" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    :root {
      --lw-mint: #22c55e;
      --lw-mint-dark: #15803d;
      --lw-bg: #f8fafc;
      --lw-card: #ffffff;
      --lw-text: #0f172a;
      --lw-border: #e2e8f0;
      --lw-radius: 20px;
    }

    body { background: var(--lw-bg); color: var(--lw-text); font-family: system-ui, sans-serif; }

    .site-header { background: #fff; border-bottom: 1px solid var(--lw-border); position: sticky; top: 0; z-index: 100; }
    .site-header .inner { max-width: 1200px; margin: 0 auto; padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    .brand { font-weight: 800; display: flex; align-items: center; gap: 10px; color: inherit; text-decoration: none; }
    .brand img { width: 34px; border-radius: 8px; }

    .page-section { max-width: 1200px; margin: 0 auto; padding: 40px 16px 100px; }
    
    .bundle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }

    .bundle-card {
      background: var(--lw-card);
      border: 1px solid var(--lw-border);
      border-radius: var(--lw-radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s;
    }

    .bundle-img { width: 100%; aspect-ratio: 16/10; object-fit: cover; border-bottom: 1px solid var(--lw-border); }
    .bundle-body { padding: 24px; display: flex; flex-direction: column; flex-grow: 1; }
    
    .bundle-includes {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 15px;
      margin: 15px 0;
      font-size: 0.9rem;
    }
    .bundle-includes ul { list-style: none; padding: 0; margin: 0; }
    .bundle-includes li::before { content: "✓ "; color: var(--lw-mint); font-weight: bold; }

    .price-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 20px; }
    .price { font-size: 2rem; font-weight: 900; color: var(--lw-text); }
    .old-price { text-decoration: line-through; color: #94a3b8; font-size: 1.1rem; }

    /* Quantity & Selector Styling */
    .selector-label { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: var(--lw-muted); margin-bottom: 5px; }
    .pen-selector { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--lw-border); margin-bottom: 15px; font-weight: 600; }

    .qty-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--lw-border);
      border-radius: 12px;
      width: fit-content;
      margin-bottom: 20px;
    }
    .qty-btn { background: none; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; }
    .qty-input { width: 40px; text-align: center; border: none; font-weight: bold; background: transparent; }

    .btn-buy {
      background: var(--lw-text);
      color: #fff;
      padding: 14px;
      border-radius: 12px;
      font-weight: 800;
      text-align: center;
      border: none;
      width: 100%;
      transition: opacity 0.2s;
    }
    .btn-buy:hover { opacity: 0.9; color: #fff; }

    .research-notice {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      padding: 10px 25px;
      border-radius: 99px;
      font-size: 0.8rem;
      z-index: 1000;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="inner">
      <a href="/" class="brand">
        <img src="/Favicon.png?v=4" alt="Lumina">
        <span>Lumina</span>
      </a>
      <nav class="d-flex gap-3">
        <a href="/" class="text-dark text-decoration-none fw-semibold">Home</a>
        <a href="/products.html" class="text-dark text-decoration-none fw-semibold">Products</a>
      </nav>
    </div>
  </header>

  <main class="page-section">
    <h1 class="fw-black mb-4">Protocol Bundles</h1>
    
    <div class="bundle-grid" id="bundleGrid">
      </div>
  </main>

  <div class="research-notice">
    Laboratory Research Use Only • Not for Human Consumption
  </div>

  <script>
    const bundles = [
      {
        id: "bundle-metabolic",
        name: "Ultimate Metabolic Stack",
        image: "/images/ultimate-metabolic-stack.png",
        contents: ["Retatrutide 60mg", "MOTS-C 40mg", "Refill Pen Device"],
        price: 220,
        oldPrice: 255,
        hasPen: true
      },
      {
        id: "bundle-repair",
        name: "Total Repair Protocol",
        image: "/images/bundle-placeholder-3.png",
        contents: ["BPC-157 & TB500 10mg", "GHK-CU 100mg"],
        price: 70,
        oldPrice: 80,
        hasPen: false
      }
    ];

    function renderBundles() {
      const container = document.getElementById('bundleGrid');
      container.innerHTML = bundles.map(bundle => `
        <article class="bundle-card">
          <img src="${bundle.image}" alt="${bundle.name}" class="bundle-img">
          <div class="bundle-body">
            <h2 class="h4 fw-bold mb-3">${bundle.name}</h2>
            
            <div class="bundle-includes">
              <ul class="mb-0">
                ${bundle.contents.map(item => `<li>${item}</li>`).join('')}
              </ul>
            </div>

            <div class="price-row">
              <span class="price">£${bundle.price}</span>
              <span class="old-price">£${bundle.oldPrice}</span>
            </div>

            ${bundle.hasPen ? `
              <label class="selector-label">Select Pen Color</label>
              <select class="pen-selector" id="pen-${bundle.id}">
                <option value="Silver">Silver Chrome</option>
                <option value="Black">Obsidian Black</option>
                <option value="Blue">Electric Blue</option>
                <option value="Pink">Rose Pink</option>
              </select>
            ` : ''}

            <div class="qty-box">
              <button class="qty-btn" onclick="updateQty('${bundle.id}', -1)">−</button>
              <input type="number" id="qty-${bundle.id}" class="qty-input" value="1" min="1" readonly>
              <button class="qty-btn" onclick="updateQty('${bundle.id}', 1)">+</button>
            </div>

            <button class="btn-buy" onclick="handleBuy('${bundle.id}')">BUY NOW</button>
          </div>
        </article>
      `).join('');
    }

    function updateQty(id, delta) {
      const input = document.getElementById(`qty-${id}`);
      let val = parseInt(input.value);
      val = Math.max(1, val + delta);
      input.value = val;
    }

    function handleBuy(bundleId) {
      const bundle = bundles.find(b => b.id === bundleId);
      const qty = parseInt(document.getElementById(`qty-${bundleId}`).value);
      let variantName = "Standard Bundle";
      
      if (bundle.hasPen) {
        const penColor = document.getElementById(`pen-${bundleId}`).value;
        variantName = `Bundle w/ ${penColor} Pen`;
      }

      // Using your existing addToCart logic from products.html
      if (typeof addToCart === "function") {
        addToCart({
          id: bundle.id,
          name: bundle.name,
          image: bundle.image
        }, qty, variantName, bundle.price); 
      } else {
        console.log("Adding to cart:", bundle.name, qty, variantName, "£" + bundle.price);
        alert(`${qty} x ${bundle.name} (${variantName}) added to your research list.`);
      }
    }

    renderBundles();
  </script>
</body>
</html>
