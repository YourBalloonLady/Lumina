<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/Favicon.png?v=4">
  <link rel="icon" type="image/png" sizes="16x16" href="/Favicon.png?v=4">
  <link rel="apple-touch-icon" sizes="180x180" href="/Favicon.png?v=4">

  <title>Research Materials Catalogue UK | Lumina</title>
  <meta name="description" content="Browse all Lumina research materials in the UK. Product formats and quantities available with discreet UK dispatch — for laboratory research use only. Not for human consumption.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --lw-mint: #22c55e;
      --lw-mint-soft: #ecfdf5;
      --lw-blue-soft: #e0f2fe;
      --lw-purple-soft: #eef2ff;
      --lw-dark: #0f172a;
      --lw-muted: #64748b;
      --lw-bg: #f3f4f6;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--lw-bg);
      color: var(--lw-dark);
      margin: 0;
      padding-top: 80px;
    }
    /* ... keep all your existing styles ... */

    .product-price {
      font-size: 1.3rem;
      font-weight: 800;
      color: #0f172a;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sale-old {
      text-decoration: line-through;
      color: #9ca3af;
      font-weight: 700;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <!-- ... your existing HTML (trust-bar, navbar, hero, etc.) remains unchanged ... -->

  <section id="products">
    <div class="container">
      <div class="text-center mb-4">
        <div class="section-eyebrow">Research Materials</div>
        <h2 class="section-title">Choose Your Format</h2>
        <p class="section-subtitle">
          Lumina supplies research materials in multiple formats depending on laboratory requirements.
        </p>
      </div>
      <div id="all-products-status" class="text-center text-muted mb-3">Loading products…</div>
      <div class="row g-4" id="all-products-list"></div>
    </div>
  </section>

  <!-- ... footer remains the same ... -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://qketnqhfjfxbqiuqevnh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrZXRucWhmamZ4YnFpdXFldm5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ2NjkzMzAsImV4cCI6MjA4MDI0NTMzMH0.JIrgLIwWIA5Gwu9K4BsgS0Y_jyax2G6irqkaf35aPys";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let products = [];
    let cart = [];

    // Load cart
    const savedCart = localStorage.getItem('cart');
    if (savedCart) {
      try { cart = JSON.parse(savedCart); } catch (e) { cart = []; }
    }

    function saveCart() {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function imgSrc(image) {
      if (!image) return '';
      return './' + encodeURIComponent(image);
    }

    // NEW: Display price with strikethrough if compare_at_price exists
    function getDisplayPriceHtml(p) {
      const currentPrice = Number(p.price || 0).toFixed(2);
      if (p.compare_at_price && Number(p.compare_at_price) > Number(p.price)) {
        return `
          <div class="product-price">
            £${currentPrice}
            <span class="sale-old">£${Number(p.compare_at_price).toFixed(2)}</span>
          </div>
        `;
      }
      return `
        <div class="product-price">
          £${currentPrice}
        </div>
      `;
    }

    function renderProducts() {
      const listEl = document.getElementById('all-products-list');
      const statusEl = document.getElementById('all-products-status');

      if (!products.length) {
        statusEl.textContent = 'No products available yet.';
        listEl.innerHTML = '';
        return;
      }

      statusEl.textContent = '';
      listEl.innerHTML = products.map((p, i) => {
        const stockNum = Number(p.stock ?? 0);
        const stockLabel = stockNum === 0 ? '<strong>Out of stock</strong>' :
                          stockNum <= 5 ? `<strong>Low stock</strong> • ${stockNum} left` :
                          `<strong>In stock</strong> • ${stockNum} available`;
        const stockClass = stockNum === 0 ? 'text-danger' : stockNum <= 5 ? 'text-warning' : 'text-success';

        return `
          <div class="col-md-3">
            <div class="position-relative h-100 product-card ${stockNum === 0 ? 'out-of-stock' : ''}" onclick="${stockNum > 0 ? `openModal(${i})` : ''}">
              <img src="${imgSrc(p.image)}" class="w-100 p-4" alt="${p.name}">
              <div class="product-body d-flex flex-column h-100">
                <div class="text-start">
                  <div class="text-uppercase text-xs text-muted" style="font-size: .75rem;">${getTypeLabel(p)}</div>
                  <div class="product-name">${p.name}</div>
                  <div class="text-muted" style="font-size:0.85rem;">
                    ${p.description || 'Research material supplied for laboratory environments.'}
                  </div>
                </div>
                <div class="mt-3">
                  ${getDisplayPriceHtml(p)}
                  <p class="stock ${stockClass} mt-2">${stockLabel}</p>
                  <button class="btn btn-success btn-add mt-auto" 
                          ${stockNum === 0 ? 'disabled' : ''}
                          onclick="event.stopPropagation(); openModal(${i})">
                    ${stockNum > 0 ? 'Add to cart' : 'Sold out'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function loadProductsFromDb() {
      const statusEl = document.getElementById('all-products-status');
      statusEl.textContent = 'Loading products…';

      const { data, error } = await supabaseClient
        .from('Products')
        .select('id, name, price, compare_at_price, image, stock, description, type')
        .order('name', { ascending: true });

      if (error) {
        console.error('Error loading products', error);
        statusEl.textContent = 'Could not load products.';
        return;
      }

      products = (data || []).map(row => ({
        id: row.id,
        name: row.name,
        price: Number(row.price || 0),
        compare_at_price: row.compare_at_price ? Number(row.compare_at_price) : null,
        image: row.image,
        stock: row.stock ?? 0,
        description: row.description || '',
        type: String(row.type || '').toLowerCase().trim()
      }));

      renderProducts();
    }

    // Modal price also shows strikethrough
    function openModal(i) {
      const p = products[i];
      if (!p || Number(p.stock ?? 0) === 0) return;

      // ... rest of your modal code remains the same until the price line ...

      document.getElementById('modalPrice').innerHTML = getDisplayPriceHtml(p);

      // ... rest of modal code (variant, qty, add to cart, etc.) stays unchanged
    }

    // Load products when page loads
    loadProductsFromDb();
  </script>
</body>
</html>
